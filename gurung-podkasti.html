<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurung Podkasti</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --surface2: #232323;
      --border: #2a2a2a;
      --accent: #e8b04a;
      --accent2: #c9893a;
      --text: #f0f0f0;
      --muted: #888;
      --red: #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    .header {
      width: 100%;
      max-width: 520px;
      padding: 40px 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .channel-name {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .channel-desc {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
    }

    /* SOCIAL BUTTONS */
    .socials {
      width: 100%;
      max-width: 520px;
      padding: 24px 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
    }

    .social-btn:hover {
      border-color: var(--accent);
      background: var(--surface2);
      color: var(--accent);
    }

    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .social-btn.yt { border-color: #ff4444; }
    .social-btn.yt:hover { background: #1a0000; color: #ff4444; }
    .social-btn.yt svg { color: #ff4444; }

    .social-btn.tg { border-color: #2ea6d9; }
    .social-btn.tg:hover { background: #001a22; color: #2ea6d9; }
    .social-btn.tg svg { color: #2ea6d9; }

    .social-btn.ig { border-color: #c13584; }
    .social-btn.ig:hover { background: #1a0011; color: #c13584; }
    .social-btn.ig svg { color: #c13584; }

    .social-btn.fb { border-color: #1877f2; }
    .social-btn.fb:hover { background: #001022; color: #1877f2; }
    .social-btn.fb svg { color: #1877f2; }

    /* DIVIDER */
    .section-label {
      width: 100%;
      max-width: 520px;
      padding: 32px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* VIDEO GRID */
    .videos {
      width: 100%;
      max-width: 520px;
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .video-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .video-thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      overflow: hidden;
    }

    .video-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-card:hover .play-btn { opacity: 1; }

    .play-btn svg {
      width: 52px;
      height: 52px;
      color: white;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* MODAL / EMBED */
    .video-embed {
      display: none;
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      background: #000;
    }

    .video-card.open .video-thumb-wrap { display: none; }
    .video-card.open .video-embed { display: block; }
    .video-card.open { border-color: var(--accent); }

    .video-info {
      padding: 14px 16px;
    }

    .video-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    /* LOADING */
    .loading {
      width: 100%;
      max-width: 520px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    .footer {
      width: 100%;
      max-width: 520px;
      padding: 0 20px 30px;
      text-align: center;
      font-size: 11px;
      color: var(--border);
    }

    @media (max-width: 380px) {
      .channel-name { font-size: 19px; }
      .social-btn { font-size: 12px; padding: 9px 14px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">
      <img id="channel-avatar" src="" alt="Gurung" onerror="this.style.display='none';this.parentElement.textContent='🎙'" />
    </div>
    <div class="channel-name">Gurung Podkasti</div>
    <div class="channel-desc">Dolzarb suhbatlar · Muhim mavzular · O'zbekiston</div>
  </div>

  <!-- SOCIAL LINKS -->
  <div class="socials">
    <a class="social-btn yt" href="https://www.youtube.com/@Gurungpodkasti" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3.01 3.01 0 00-2.12-2.13C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.38.57A3.01 3.01 0 00.5 6.2 31.5 31.5 0 000 12a31.5 31.5 0 00.5 5.8 3.01 3.01 0 002.12 2.13C4.5 20.5 12 20.5 12 20.5s7.5 0 9.38-.57a3.01 3.01 0 002.12-2.13A31.5 31.5 0 0024 12a31.5 31.5 0 00-.5-5.8zM9.75 15.5V8.5l6.5 3.5-6.5 3.5z"/></svg>
      YouTube
    </a>
    <a class="social-btn tg" href="https://t.me/gurungpodkasti" target="_blank" rel="noopener" id="tg-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.19 13.267l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.958.292z"/></svg>
      Telegram
    </a>
    <a class="social-btn ig" href="https://instagram.com/gurungpodkasti" target="_blank" rel="noopener" id="ig-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Instagram
    </a>
    <a class="social-btn fb" href="https://facebook.com/gurungpodkasti" target="_blank" rel="noopener" id="fb-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </a>
  </div>

  <!-- VIDEOS SECTION -->
  <div class="section-label"><span>So'nggi videolar</span></div>

  <div id="video-container" class="videos">
    <div class="loading">
      <div class="spinner"></div>
      Videolar yuklanmoqda…
    </div>
  </div>

  <div class="footer">© 2025 Gurung Podkasti</div>

  <script>
    const CHANNEL_ID = 'UCcCVgZXjKECC1L8ZHcR3xIQ';
    const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}&api_key=public&count=10`;

    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr)) / 1000;
      if (diff < 3600) return `${Math.floor(diff/60)} daqiqa oldin`;
      if (diff < 86400) return `${Math.floor(diff/3600)} soat oldin`;
      if (diff < 2592000) return `${Math.floor(diff/86400)} kun oldin`;
      if (diff < 31536000) return `${Math.floor(diff/2592000)} oy oldin`;
      return `${Math.floor(diff/31536000)} yil oldin`;
    }

    function getVideoId(url) {
      const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
      return m ? m[1] : null;
    }

    async function loadVideos() {
      const container = document.getElementById('video-container');
      try {
        const res = await fetch(RSS_URL);
        const data = await res.json();

        if (!data.items || !data.items.length) throw new Error('No items');

        // Set avatar from feed
        if (data.feed && data.feed.image) {
          document.getElementById('channel-avatar').src = data.feed.image;
        }

        container.innerHTML = '';
        data.items.forEach((item, idx) => {
          const videoId = getVideoId(item.link) || item.guid?.split(':').pop();
          const thumb = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

          const card = document.createElement('div');
          card.className = 'video-card';
          card.innerHTML = `
            <div class="video-thumb-wrap">
              <img src="${thumb}" alt="${item.title}" loading="lazy" />
              <div class="play-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12" fill="rgba(0,0,0,0.6)"/><polygon points="10,8 17,12 10,16" fill="white"/></svg>
              </div>
            </div>
            <iframe class="video-embed" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <div class="video-info">
              <div class="video-title">${item.title}</div>
              <div class="video-meta">${timeAgo(item.pubDate)}</div>
            </div>
          `;

          card.addEventListener('click', () => {
            const wasOpen = card.classList.contains('open');
            // Close all
            document.querySelectorAll('.video-card.open').forEach(c => {
              c.classList.remove('open');
              c.querySelector('.video-embed').src = '';
            });
            if (!wasOpen) {
              card.classList.add('open');
              card.querySelector('.video-embed').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
              card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          });

          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = `
          <div class="loading" style="color:#888">
            Videolarni yuklab bo'lmadi.<br>
            <a href="https://www.youtube.com/@Gurungpodkasti" target="_blank" style="color:var(--accent);text-decoration:none;">YouTube kanalga o'tish →</a>
          </div>
        `;
      }
    }

    loadVideos();
  </script>
</body>
</html>
